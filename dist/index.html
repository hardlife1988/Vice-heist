<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vice Heist Slot - Stake Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>Vice Heist</h1>
        <div id="reels" class="reels"></div>
        <div class="controls">
            <button id="spin">SPIN (1x)</button>
            <button id="bonus-buy">Bonus Buy (100x)</button>
            <div>Balance: <span id="balance">1000.00</span></div>
        </div>
        <div id="log"></div>
    </div>
    <script src="game.js"></script>
</body>
</html>
